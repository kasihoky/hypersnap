# Hypersnap sample configuration
# This reflects the defaults used in the Docker image.
# Override any values via this file, environment variables (SNAPCHAIN_ prefix),
# or CLI flags.

rpc_address = "0.0.0.0:3383"
http_address = "0.0.0.0:3381"
rocksdb_dir = ".rocks"
fc_network = "Mainnet"
read_node = true

[statsd]
prefix = "snapchain"
addr = "127.0.0.1:8125"
use_tags = true

[gossip]
address = "/ip4/0.0.0.0/udp/3382/quic-v1"
# bootstrap_peers = "/ip4/..., /ip4/..."

[consensus]
shard_ids = [1, 2]
num_shards = 2

[hyper]
enabled = true
# retention_soft_cap = 500000  # Optional: alert on disk growth
# metrics_interval = "60s"

[api]
enabled = true

[api.social_graph]
enabled = true

[api.channels]
enabled = true

[api.metrics]
enabled = true

[api.feeds]
enabled = true

[api.conversations]
enabled = true

[snapshot]
endpoint_url = "https://e1f9f185c6e63471dd39f96abd3413c4.r2.cloudflarestorage.com"
load_db_from_snapshot = true
